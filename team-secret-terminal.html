<!DOCTYPE html>
<html lang="de">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Team Secret Terminal 🕹️</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #0a0c10;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Courier New', Courier, monospace;
      padding: 24px;
    }

    .scanlines {
      pointer-events: none;
      position: fixed;
      inset: 0;
      background: repeating-linear-gradient(to bottom,
          transparent 0px,
          transparent 3px,
          rgba(0, 0, 0, 0.08) 3px,
          rgba(0, 0, 0, 0.08) 4px);
      z-index: 100;
    }

    .terminal {
      width: 100%;
      max-width: 780px;
      background: #0d1117;
      border-radius: 14px;
      border: 1px solid #30363d;
      overflow: hidden;
      box-shadow:
        0 0 0 1px #21262d,
        0 24px 64px rgba(0, 0, 0, 0.8),
        0 0 80px rgba(63, 185, 80, 0.04);
    }

    .titlebar {
      background: #161b22;
      padding: 13px 16px;
      display: flex;
      align-items: center;
      gap: 8px;
      border-bottom: 1px solid #21262d;
      user-select: none;
    }

    .dot {
      width: 13px;
      height: 13px;
      border-radius: 50%;
    }

    .dot-red {
      background: #ff5f57;
    }

    .dot-yellow {
      background: #febc2e;
    }

    .dot-green {
      background: #28c840;
    }

    .title-text {
      color: #6e7681;
      font-size: 13px;
      margin-left: 8px;
      letter-spacing: 0.4px;
    }

    .hint-badge {
      margin-left: auto;
      font-size: 11px;
      color: #3fb950;
      border: 1px solid #238636;
      border-radius: 20px;
      padding: 2px 10px;
      letter-spacing: 0.5px;
    }

    #output {
      padding: 18px 20px;
      min-height: 380px;
      max-height: 520px;
      overflow-y: auto;
      color: #e6edf3;
      font-size: 14px;
      line-height: 1.75;
      scrollbar-width: thin;
      scrollbar-color: #30363d transparent;
    }

    #output::-webkit-scrollbar {
      width: 5px;
    }

    #output::-webkit-scrollbar-thumb {
      background: #30363d;
      border-radius: 4px;
    }

    .input-row {
      display: flex;
      align-items: center;
      border-top: 1px solid #21262d;
      padding: 11px 20px;
      gap: 10px;
    }

    .prompt-label {
      color: #3fb950;
      font-size: 14px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    #cmd {
      background: transparent;
      border: none;
      outline: none;
      color: #e6edf3;
      font-family: 'Courier New', Courier, monospace;
      font-size: 14px;
      flex: 1;
      caret-color: #3fb950;
    }

    #cmd::placeholder {
      color: #3d444d;
    }

    .footer {
      text-align: center;
      padding: 14px;
      font-size: 12px;
      color: #3d444d;
      border-top: 1px solid #161b22;
      letter-spacing: 0.3px;
    }

    .gr {
      color: #3fb950;
    }

    .bl {
      color: #58a6ff;
    }

    .yl {
      color: #e3b341;
    }

    .rd {
      color: #ff7b72;
    }

    .gy {
      color: #8b949e;
    }

    .dm {
      color: #6e7681;
    }

    .wh {
      color: #e6edf3;
    }

    .cy {
      color: #79c0ff;
    }

    @keyframes konami-flash {

      0%,
      100% {
        background: #0d1117;
      }

      20% {
        background: #1a2e1a;
      }

      40% {
        background: #0d1117;
      }

      60% {
        background: #1a2e1a;
      }
    }

    .konami-flash {
      animation: konami-flash 0.8s ease;
    }
  </style>
</head>

<body>

  <div class="scanlines"></div>

      <span class="title-text">team@secret-terminal — bash — 80x24</span>
      <span class="hint-badge">Konami-Code: ↑↑↓↓←→←→BA</span>

    <div id="output"></div>

        ];
        return '<div class="yl">' + fortunes[Math.floor(Math.random() * fortunes.length)] + '</div>';
      },

      'matrix': function () { return '<div id="matrix-out" style="font-family:monospace; font-size:12px; line-height:1.3; color:#3fb950"></div>'; },

      'whoami': function () { return '<div class="gr">team-member</div><div class="gy">' + dm('Und das reicht vollkommen.') + '</div>'; },
      'date': function () { return '<div class="wh">' + new Date().toLocaleString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit' }) + '</div><div class="gy">' + dm('Zeit fliegt, wenn man Bugs fixt.') + '</div>'; },
      'uname -a': function () { return '<div class="wh">TeamOS 42.0 team-kernel #1 SMP PREEMPT_DYNAMIC (kaffeebetrieben) x86_mood</div>'; },
      'pwd': function () { return '<div class="wh">/home/team/awesome-projekt/irgendwo-tief-in-der-codebasis</div>'; },

      'ls easter-egg-1': function () { return '<div class="gy">Dieser Ordner ist leer. Oder ist er das?<br>' + dm('Versuche: cat geheimnis.txt') + '</div>'; },
      'ls easter-egg-2': function () { return '<div class="bl">Du bist der zweite Easter-Egg-Finder des Teams!<br><span class="gy">Preis: Imaginaere Bonuspunkte + Kaffee (selbst holen).</span></div>'; },

      'rm -rf /': function () {
        return (
          '<div class="rd">rm: Removing /<br>'
          + 'rm: Removing /bin<br>'
          + 'rm: Removing /etc<br>'
          + 'rm: Removing /home<br>'
          + 'rm: Removing /your-career<br>'
          + 'rm: Removing /your-confidence<br>'
          + 'rm: Removing /everything ...</div>'
          + '<div class="gr" style="margin-top:8px">Sike! Sandbox-Modus aktiv. Du bist sicher.</div>'
          + '<div class="gy">Aber wirklich: niemals. Bitte.<br>'
          + dm('Und ja, wir kennen die Person, die das schon gemacht hat.') + '</div>'
        );
      },

      'reboot': function () { return '<div class="rd">Neustart wird verhindert -- Aenderungen nicht gespeichert.</div><div class="gy">' + dm('Hast du es schon mit Aus- und Einschalten probiert?') + '</div>'; },
      'exit': function () { return '<div class="rd">exit: Nein. Du bleibst. Wir haben Spass hier.</div>'; },
      'quit': function () { return '<div class="rd">quit: Das Terminal endet nie. Wie offene Jira-Tickets.</div>'; },
      'q': function () { return '<div class="rd">q: Falsches Terminal -- bist du in Vim gestartet? Versuche :q!</div>'; },
      'clear': function () { out.innerHTML = ''; return null; },
    };

    /* ── deploy animation ── */
    function runDeploy() {
      var el = document.getElementById('deploy-out');
      if (!el) return;
      var steps = [
        [400, 'Tests laufen ...', false],
        [1000, 'Tests bestanden (42/42)', false],
        [1500, 'Build kompilieren ...', false],
        [2100, 'Build erfolgreich (14,2 MB)', false],
        [2500, 'Deploying to Production ...', false],
        [3300, 'PRODUCTION IS DOWN', true],
        [3500, '', false],
        [4000, '(Sike! Alles gut. Diesmal.)', false],
        [4500, 'Deploy erfolgreich -- Feature-Flag ist noch aus', false],
      ];
      steps.forEach(function (step) {
        var t = step[0], msg = step[1], red = step[2];
        setTimeout(function () {
          if (!msg) { el.innerHTML += '<br>'; return; }
          el.style.color = red ? '#ff7b72' : '#8b949e';
          el.innerHTML += msg + '<br>';
          out.scrollTop = out.scrollHeight;
        }, t);
      });
    }

    /* ── npm animation ── */
    function runNpm() {
      var el = document.getElementById('npm-out');
      if (!el) return;
      var msgs = [
        ['added 1 package (moment)', false],
        ['added 47 packages', false],
        ['added 312 packages', false],
        ['added 1.847 packages', false],
        ['added 47.291 packages', false],
        ['', false],
        ['npm warn: 3 high severity vulnerabilities', true],
        ['npm warn: run npm audit fix to fix them', true],
        ['(Es werden neue entstehen)', true],
        ['', false],
        ['Fertig! node_modules: 423 MB', false],
      ];
      msgs.forEach(function (pair, i) {
        var msg = pair[0], warn = pair[1];
        setTimeout(function () {
          if (!msg) { el.innerHTML += '<br>'; return; }
          el.innerHTML += '<span style="color:' + (warn ? '#e3b341' : '#8b949e') + '">' + esc(msg) + '</span><br>';
          out.scrollTop = out.scrollHeight;
        }, i * 270);
      });
    }

    /* ── matrix animation ── */
    function runMatrix() {
      var el = document.getElementById('matrix-out');
      if (!el) return;
      var chars = '01AvBkTzQmXpRcLnHw9eFjUiYsDgOo';
      var count = 0;
      var iv = setInterval(function () {
        var row = '';
        for (var i = 0; i < 55; i++) row += chars[Math.floor(Math.random() * chars.length)] + ' ';
        el.innerHTML += row + '<br>';
        out.scrollTop = out.scrollHeight;
        if (++count >= 10) {
          clearInterval(iv);
          setTimeout(function () {
            el.innerHTML += '<br><span style="color:#ff7b72">Wake up, Neo...</span><br>';
            out.scrollTop = out.scrollHeight;
          }, 400);
        }
      }, 110);
    }

    /* ── konami ── */
    function triggerKonami() {
      term.classList.add('konami-flash');
      setTimeout(function () { term.classList.remove('konami-flash'); }, 900);
      print(
        '<div style="border:1px solid #3fb950; border-radius:8px; padding:12px 16px; margin:8px 0; text-align:center">'
        + '<div class="yl" style="font-size:17px; letter-spacing:2px">*** KONAMI CODE AKTIVIERT ***</div>'
        + '<div class="dm" style="margin:6px 0; font-size:12px">hoch hoch runter runter links rechts links rechts B A</div>'
        + '<div class="gr">+30 Leben gutgeschrieben.<br>Du bist offiziell ein 10x-Entwickler.</div>'
        + '<div class="bl" style="margin-top:8px; font-size:12px">Das Team weiss jetzt, dass du Cheats kennst.</div>'
        + '</div>'
      );
    }

    /* ── main input handler ── */
    function handleCmd(raw) {
      var cmd = raw.trim().toLowerCase();
      if (!cmd) return;
      cmdHistory.unshift(raw);
      histIdx = -1;
      printPrompt(raw);

      if (cmd === 'deploy') { print(cmds['deploy']()); setTimeout(runDeploy, 100); return; }
      if (cmd === 'npm install') { print(cmds['npm install']()); setTimeout(runNpm, 100); return; }
      if (cmd === 'matrix') { print(cmds['matrix']()); setTimeout(runMatrix, 100); return; }

      if (cmd === 'konami') { triggerKonami(); return; }

      var fn = cmds[cmd];
      if (fn) {
        var res = fn();
        if (res !== null && res !== undefined) print(res);
      } else {
        print('<span class="rd">command not found: ' + esc(raw) + '</span> <span class="dm">-- Tipp: tippe \'help\'</span>');
      }
    }

    inp.addEventListener('keydown', function (e) {
      konamiSeq.push(e.key);
      if (konamiSeq.length > KONAMI.length) konamiSeq.shift();
      if (JSON.stringify(konamiSeq) === JSON.stringify(KONAMI)) { triggerKonami(); konamiSeq = []; }

      if (e.key === 'Enter') {
        var v = inp.value; inp.value = ''; handleCmd(v);
      } else if (e.key === 'ArrowUp') {
        e.preventDefault();
        if (histIdx < cmdHistory.length - 1) { histIdx++; inp.value = cmdHistory[histIdx]; }
      } else if (e.key === 'ArrowDown') {
        e.preventDefault();
        if (histIdx > 0) { histIdx--; inp.value = cmdHistory[histIdx]; }
        else { histIdx = -1; inp.value = ''; }
      }
    });

    document.addEventListener('click', function () { inp.focus(); });

    /* ── welcome ── */
    var now = new Date();
    print(
      '<div>'
      + '<span class="bl">+================================================+</span><br>'
      + '<span class="bl">|   Welcome to the Team Secret Terminal          |</span><br>'
      + '<span class="bl">+================================================+</span>'
      + '</div>'
      + '<div style="margin:8px 0" class="gy">'
      + 'Version: <span class="gr">1.3.37</span>  |  '
      + now.toLocaleDateString('de-DE', { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' })
      + '<br>Kernel: ' + dm('TeamOS 42.0 (kaffeebetrieben)')
      + '</div>'
      + '<div class="dm">Psst: Es gibt einen Konami-Code ... und noch mehr Geheimnisse.</div>'
      + '<div style="margin-top:8px">Tippe <span class="gr">help</span> um alle Befehle zu sehen.</div>'
    );

    inp.focus();
  </script>
